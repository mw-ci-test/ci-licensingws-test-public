parameters:
- name: mathworks.licensing.endpoint
  type: string
  default: ""
- name: job_to_run
  type: string
  values:
  - test_v1
  - test_v0

jobs:
- job: test_v1
  condition: eq('${{ parameters.job_to_run }}', 'test_v1')
  # Added release parameter to pin macOS-latest to r2025b because r2026a and later
  # do not support intel macOS. Remove when Azure DevOps supports Apple Silicon
  strategy:
    matrix:
      linux:
        imageName: 'ubuntu-latest'
        release: latest
      mac:
        imageName: 'macOS-latest'
        release: r2025b
      windows:
        imageName: 'windows-latest'
        release: latest
  pool:
    vmImage: $(imageName)
  steps:
  - task: InstallMATLAB@1
    inputs:
      release: $(release)
  - task: RunMATLABTests@1
    inputs: 
      sourceFolder: tests
      testResultsJUnit: test-results/results.xml

- job: test_v0
  condition: eq('${{ parameters.job_to_run }}', 'test_v0')
  strategy:
    matrix:
      linux:
        imageName: 'ubuntu-latest'
      mac:
        imageName: 'macOS-latest'
      windows:
        imageName: 'windows-latest'
  pool:
    vmImage: $(imageName)
  steps:
  - task: InstallMATLAB@0
  - task: RunMATLABTests@0
    inputs: 
      sourceFolder: tests
      testResultsJUnit: test-results/results.xml
    
